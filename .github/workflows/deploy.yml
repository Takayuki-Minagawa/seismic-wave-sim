name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Grant only the minimum permissions required for Pages deployment.
# The build job reads source; the deploy job writes to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment at a time.
# A run in progress will not be cancelled; new pushes queue behind it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Job 1: Lint, type-check, and build ──────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check & build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # ── Job 2: Deploy to GitHub Pages ───────────────────────────────────────────
  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
